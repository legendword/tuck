name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Run tests
        run: cargo test

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin --bin tuck

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin --bin tuck

      - name: Create universal binary
        run: |
          lipo -create -output tuck-macos-universal \
            target/aarch64-apple-darwin/release/tuck \
            target/x86_64-apple-darwin/release/tuck

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: tuck-macos-universal
