name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Run tests
        run: cargo test

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin --bin tuck

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin --bin tuck

      - name: Create universal binary
        run: |
          lipo -create -output tuck-macos-universal \
            target/aarch64-apple-darwin/release/tuck \
            target/x86_64-apple-darwin/release/tuck

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build FFI library
        run: ./build-ffi.sh

      - name: Build macOS app
        run: |
          cd TuckApp
          xcodegen generate
          xcodebuild build -project TuckApp.xcodeproj -scheme TuckApp \
            -configuration Release -derivedDataPath build
          APP_PATH="build/Build/Products/Release/Tuck.app"
          test -d "$APP_PATH" || { echo "App not found at $APP_PATH"; exit 1; }

      - name: Create DMG
        run: |
          APP_PATH="TuckApp/build/Build/Products/Release/Tuck.app"
          DMG_DIR=$(mktemp -d)
          cp -R "$APP_PATH" "$DMG_DIR/"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create -volname "Tuck" -srcfolder "$DMG_DIR" \
            -ov -format UDZO Tuck.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tuck-macos-universal
            Tuck.dmg
