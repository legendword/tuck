name: TuckApp
options:
  bundleIdPrefix: com.legendword
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.40"

targets:
  TuckApp:
    type: application
    platform: macOS
    sources:
      - path: TuckApp
      - path: Generated
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.legendword.TuckApp
        PRODUCT_NAME: Tuck
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        LIBRARY_SEARCH_PATHS: "$(PROJECT_DIR)/../target/universal"
        HEADER_SEARCH_PATHS: "$(PROJECT_DIR)/Generated"
        SWIFT_INCLUDE_PATHS: "$(PROJECT_DIR)/Generated"
        OTHER_LDFLAGS:
          - "-ltuck_ffi"
        ENABLE_APP_SANDBOX: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: true
